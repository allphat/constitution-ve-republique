<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Évolution de la Constitution de la Ve République</title>
  <script src="https://cdn.jsdelivr.net/npm/vis-timeline@latest/standalone/umd/vis-timeline.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vis-timeline@latest/styles/vis-timeline-graph2d.min.css">
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 20px; }
    h1 { text-align: center; color: #60a5fa; }
    .container { max-width: 1200px; margin: 0 auto; }
    .controls { display: flex; gap: 15px; flex-wrap: wrap; margin: 20px 0; justify-content: center; }
    select, button { padding: 10px 15px; font-size: 16px; border-radius: 8px; background: #1e2937; color: #e2e8f0; border: 1px solid #334155; }
    button { background: #3b82f6; cursor: pointer; }
    button:hover { background: #2563eb; }
    .diff-container { background: #1e2937; padding: 20px; border-radius: 12px; margin-top: 30px; white-space: pre-wrap; font-family: monospace; line-height: 1.5; }
    .added { background: #14532d; color: #86efac; }
    .removed { background: #7f1d1d; color: #fda4af; }
    .timeline, .chart-container { margin: 30px 0; background: #1e2937; padding: 20px; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Évolution de la Constitution de la Ve République (1958 → aujourd’hui)</h1>

    <div class="controls">
      <select id="date1"></select>
      <span>vs</span>
      <select id="date2"></select>
      <button onclick="showDiff()">Voir les différences</button>
    </div>

    <div class="timeline" id="timeline"></div>
    <div class="chart-container">
      <canvas id="articleChart"></canvas>
    </div>

    <div id="diffResult" class="diff-container" style="display:none;"></div>
  </div>

  <script src="metadata.json"></script>
  <script>
    const versions = metadata; // chargé depuis metadata.json

    // Remplir les selecteurs
    const select1 = document.getElementById('date1');
    const select2 = document.getElementById('date2');
    versions.forEach(v => {
      const opt1 = new Option(v.description, v.date);
      const opt2 = new Option(v.description, v.date);
      select1.add(opt1);
      select2.add(opt2);
    });
    select2.selectedIndex = versions.length - 1; // dernière version par défaut

    // Timeline
    const items = new vis.DataSet(versions.map(v => ({
      id: v.date,
      content: v.description,
      start: v.date,
      title: `${v.nb_articles} articles`
    })));

    const timeline = new vis.Timeline(document.getElementById('timeline'), items, {
      zoomMin: 1000 * 60 * 60 * 24 * 365 * 5, // ~5 ans
      zoomMax: 1000 * 60 * 60 * 24 * 365 * 70,
      min: '1958-01-01',
      max: '2025-12-31'
    });

    timeline.on('click', function(props) {
      if (props.item) {
        window.open(`https://github.com/allphat/constitution-ve-republique/blob/master/clean_versions/constitution_${props.item}.md`, '_blank');
      }
    });

    // Graphique évolution du nombre d'articles
    new Chart(document.getElementById('articleChart'), {
      type: 'line',
      data: {
        labels: versions.map(v => v.date),
        datasets: [{
          label: 'Nombre d’articles',
          data: versions.map(v => v.nb_articles),
          borderColor: '#60a5fa',
          tension: 0.3,
          fill: false
        }]
      },
      options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });

    // Fonction Diff
    async function showDiff() {
      const date1 = document.getElementById('date1').value;
      const date2 = document.getElementById('date2').value;

      if (date1 === date2) {
        alert("Choisissez deux dates différentes");
        return;
      }

      const res1 = await fetch(`../clean_versions/constitution_${date1}.md`);
      const res2 = await fetch(`../clean_versions/constitution_${date2}.md`);
      const text1 = await res1.text();
      const text2 = await res2.text();

      // Diff simple ligne par ligne
      const lines1 = text1.split('\n');
      const lines2 = text2.split('\n');

      let diffHtml = `<h2>Différence entre ${date1} et ${date2}</h2>`;

      const maxLines = Math.max(lines1.length, lines2.length);
      for (let i = 0; i < maxLines; i++) {
        const line1 = lines1[i] || '';
        const line2 = lines2[i] || '';

        if (line1 === line2) {
          diffHtml += `<div>${line1}</div>`;
        } else {
          if (line1) diffHtml += `<div class="removed">- ${line1}</div>`;
          if (line2) diffHtml += `<div class="added">+ ${line2}</div>`;
        }
      }

      document.getElementById('diffResult').innerHTML = diffHtml;
      document.getElementById('diffResult').style.display = 'block';
    }
  </script>
</body>
</html>
