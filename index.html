<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Évolution Constitution Ve République</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-timeline/8.3.1/vis-timeline-graph2d.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis-timeline/8.3.1/vis-timeline-graph2d.min.css">

  <style>
    :root {
      --primary: #1e40af;
      --primary-light: #3b82f6;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e2937;
      --text-light: #64748b;
    }

    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      margin: 0; 
      padding: 15px; 
      line-height: 1.6;
    }
    h1 { 
      text-align: center; 
      color: var(--primary); 
      font-size: 1.8rem; 
      margin: 10px 0 5px; 
    }
    .subtitle { 
      text-align: center; 
      color: var(--text-light); 
      font-size: 1rem; 
      margin-bottom: 25px; 
    }

    .container { max-width: 100%; margin: 0 auto; }

    /* Stats globales - responsive */
    .global-stats, .comparison-stats {
      background: var(--card); 
      padding: 20px; 
      border-radius: 16px; 
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      display: flex; 
      flex-wrap: wrap; 
      gap: 15px; 
      justify-content: center; 
      margin: 20px 0;
    }
    .stat-card { 
      text-align: center; 
      min-width: 140px; 
      background: #f8fafc; 
      padding: 18px 15px; 
      border-radius: 12px; 
      flex: 1 1 140px;
    }
    .stat-value { font-size: 2.2rem; font-weight: 700; margin-bottom: 6px; color: var(--primary); }
    .stat-label { font-size: 0.95rem; color: var(--text-light); }

    /* Controls - mieux adapté mobile */
    .controls { 
      background: var(--card); 
      padding: 20px; 
      border-radius: 16px; 
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      display: flex; 
      flex-direction: column; 
      gap: 15px; 
      align-items: center; 
      margin: 20px 0;
    }
    @media (min-width: 600px) {
      .controls { flex-direction: row; flex-wrap: wrap; justify-content: center; }
    }
    select { 
      padding: 14px 18px; 
      font-size: 1.05rem; 
      border: 2px solid #e2e8f0; 
      border-radius: 10px; 
      width: 100%; 
      max-width: 320px; 
      background: white;
    }
    button { 
      padding: 14px 24px; 
      font-size: 1.05rem; 
      font-weight: 600; 
      background: var(--primary); 
      color: white; 
      border: none; 
      border-radius: 10px; 
      cursor: pointer; 
      width: 100%; 
      max-width: 320px;
    }
    button:hover { background: var(--primary-light); }

    .reset-btn { background: #64748b; }
    .reset-btn:hover { background: #475569; }

    /* Conteneurs */
    .version-text, .diff-container {
      background: var(--card); 
      padding: 20px; 
      border-radius: 16px; 
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      margin: 25px 0; 
      max-height: 60vh; 
      overflow-y: auto; 
      font-family: ui-monospace, monospace; 
      line-height: 1.65;
      font-size: 0.98rem;
    }
    .diff-pre {
      white-space: pre;
      font-family: ui-monospace, monospace;
      line-height: 1.7;
      margin: 0;
      padding: 15px;
      background: #f8fafc;
      border-radius: 10px;
      overflow-x: auto;
    }
    .added { background: #dcfce7; color: #166534; }
    .removed { background: #fee2e2; color: #991b1b; }
    .unchanged { color: #64748b; }

    .timeline, .chart-container { 
      margin: 30px 0; 
      background: var(--card); 
      padding: 20px; 
      border-radius: 16px; 
      box-shadow: 0 6px 20px rgba(0,0,0,0.08); 
    }
    .chart-container { height: 420px; }

    @media (max-width: 600px) {
      .chart-container { height: 340px; }
      h1 { font-size: 1.9rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Évolution Constitution Ve République</h1>
    <p class="subtitle">De 1958 à aujourd’hui — Toutes les révisions</p>

    <div class="global-stats">
      <div class="stat-card">
        <div class="stat-value" id="totalVersions">25</div>
        <div class="stat-label">Versions</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="currentArticles">89</div>
        <div class="stat-label">Articles aujourd’hui</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="lastChange">2024-03-08</div>
        <div class="stat-label">Dernière modif</div>
      </div>
    </div>

    <div class="controls">
      <select id="date1"></select>
      <select id="date2"></select>
      <button onclick="loadDiff()">Comparer</button>
      <button class="reset-btn" onclick="resetAll()">Réinitialiser</button>
    </div>

    <div id="comparisonStats" class="comparison-stats" style="display:none;">
      <div class="stat-card green">
        <div class="stat-value" id="addedArticles">0</div>
        <div class="stat-label">Ajoutés</div>
        <div class="stat-percent" id="addedPercent">0%</div>
      </div>
      <div class="stat-card red">
        <div class="stat-value" id="removedArticles">0</div>
        <div class="stat-label">Supprimés</div>
        <div class="stat-percent" id="removedPercent">0%</div>
      </div>
      <div class="stat-card orange">
        <div class="stat-value" id="modifiedArticles">0</div>
        <div class="stat-label">Modifiés</div>
        <div class="stat-percent" id="modifiedPercent">0%</div>
      </div>
    </div>

    <div id="versionText" class="version-text" style="display:none;"></div>

    <div class="timeline" id="timeline"></div>

    <div class="chart-container">
      <canvas id="articleChart"></canvas>
    </div>

    <div id="diffResult" class="diff-container" style="display:none;"></div>
  </div>

  <script>
    // === TON CODE JS (inchangé, juste les chemins) ===
    const xhr = new XMLHttpRequest();
    xhr.open("GET", "metadata.json", false);
    xhr.send();
    const versions = JSON.parse(xhr.responseText);

    document.getElementById('totalVersions').textContent = versions.length;
    document.getElementById('currentArticles').textContent = versions[versions.length-1].nb_articles;
    document.getElementById('lastChange').textContent = versions[versions.length-1].date;

    const s1 = document.getElementById('date1');
    const s2 = document.getElementById('date2');
    versions.forEach(v => {
      s1.add(new Option(v.description, v.date));
      s2.add(new Option(v.description, v.date));
    });
    s2.selectedIndex = versions.length - 1;

    const timeline = new vis.Timeline(document.getElementById('timeline'), 
      new vis.DataSet(versions.map(v => ({ id: v.date, content: v.description, start: v.date }))), 
      { min: '1958-01-01', max: '2025-12-31', width: '100%' }
    );

    timeline.on('click', async function (props) {
      if (props.item) {
        const text = await (await fetch(`clean_versions/constitution_${props.item}.md`)).text();
        document.getElementById('versionText').innerHTML = `<pre>${text}</pre>`;
        document.getElementById('versionText').style.display = 'block';
        document.getElementById('comparisonStats').style.display = 'none';
        document.getElementById('diffResult').style.display = 'none';
      }
    });

    new Chart(document.getElementById('articleChart'), {
      type: 'line',
      data: {
        labels: versions.map(v => v.date),
        datasets: [{ 
          label: 'Nombre d’articles', 
          data: versions.map(v => v.nb_articles), 
          borderColor: '#1e40af', 
          tension: 0.3 
        }]
      },
      options: { 
        responsive: true, 
        maintainAspectRatio: false, 
        scales: { y: { min: 70, max: 115 } } 
      }
    });

    window.loadDiff = async () => {
      const d1 = document.getElementById('date1').value;
      const d2 = document.getElementById('date2').value;
      if (d1 === d2) return alert("Choisissez deux dates différentes");

      try {
        const [diffText, text1, text2] = await Promise.all([
          fetch(`diffs/${d1}_vs_${d2}.diff`).then(r => r.text()),
          fetch(`clean_versions/constitution_${d1}.md`).then(r => r.text()),
          fetch(`clean_versions/constitution_${d2}.md`).then(r => r.text())
        ]);

        const articles1 = extractArticles(text1);
        const articles2 = extractArticles(text2);

        let added = 0, removed = 0, modified = 0;

        Object.keys(articles2).forEach(art => { if (!articles1[art]) added++; });
        Object.keys(articles1).forEach(art => { if (!articles2[art]) removed++; });
        Object.keys(articles1).forEach(art => { 
          if (articles2[art] && articles1[art] !== articles2[art]) modified++; 
        });

        const base = Object.keys(articles1).length || 1;

        document.getElementById('addedArticles').textContent = added;
        document.getElementById('addedPercent').textContent = ((added / base) * 100).toFixed(1) + '%';
        document.getElementById('removedArticles').textContent = removed;
        document.getElementById('removedPercent').textContent = ((removed / base) * 100).toFixed(1) + '%';
        document.getElementById('modifiedArticles').textContent = modified;
        document.getElementById('modifiedPercent').textContent = ((modified / base) * 100).toFixed(1) + '%';

        document.getElementById('comparisonStats').style.display = 'flex';

        let html = `<h2>Diff entre ${d1} et ${d2}</h2><pre class="diff-pre">`;
        diffText.split('\n').forEach(line => {
          if (line.startsWith('+')) html += `<span class="added">+ ${line.slice(1)}</span>\n`;
          else if (line.startsWith('-')) html += `<span class="removed">- ${line.slice(1)}</span>\n`;
          else if (line.trim()) html += `<span class="unchanged">${line}</span>\n`;
          else html += '\n';
        });
        html += `</pre>`;

        document.getElementById('diffResult').innerHTML = html;
        document.getElementById('diffResult').style.display = 'block';
        document.getElementById('versionText').style.display = 'none';

      } catch (e) {
        console.error(e);
        alert("Impossible de charger le diff.");
      }
    };

    function resetAll() {
      document.getElementById('versionText').style.display = 'none';
      document.getElementById('comparisonStats').style.display = 'none';
      document.getElementById('diffResult').style.display = 'none';
      document.getElementById('date1').selectedIndex = 0;
      document.getElementById('date2').selectedIndex = versions.length - 1;
    }

    function extractArticles(text) {
      const articles = {};
      const lines = text.split('\n');
      let current = null;
      let content = [];
      for (let line of lines) {
        const match = line.match(/^Article\s+(PREAMBULE|\d+)/i);
        if (match) {
          if (current) articles[current] = content.join('\n').trim();
          current = line.trim();
          content = [];
        } else if (current) content.push(line);
      }
      if (current) articles[current] = content.join('\n').trim();
      return articles;
    }
  </script>
</body>
</html>
